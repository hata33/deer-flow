# Mini Agent 配置文件示例

# 日志配置
log_level: INFO
debug: false

# 模型配置
models:
  - name: gpt-4
    provider: openai
    model: gpt-4-turbo-preview
    api_key: ${OPENAI_API_KEY}  # 从环境变量读取
    supports_vision: false
    supports_tools: true
    temperature: 0.7
    max_tokens: 4096

  - name: claude-3
    provider: anthropic
    model: claude-3-opus-20240229
    api_key: ${ANTHROPIC_API_KEY}
    supports_vision: true
    supports_tools: true
    temperature: 0.7

  - name: gpt-3.5
    provider: openai
    model: gpt-3.5-turbo
    api_key: ${OPENAI_API_KEY}
    supports_vision: false
    supports_tools: true
    temperature: 0.7

# 默认模型
default_model: gpt-4

# 沙箱配置
sandbox_enabled: true
sandbox_work_dir: work

# 记忆配置
memory_enabled: true
memory_max_messages: 100

# 工具配置
tools_enabled: true
